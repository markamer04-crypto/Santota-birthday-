<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Santy! 🎉</title>
    <style>
        :root {
            --primary-color: #ff6b81;
            --secondary-color: #f7d794;
            --text-color: #2c3e50;
            --bg-grad-1: #ffeaa7;
            --bg-grad-2: #ff7675;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-align: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(5px);
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* Hidden Audio Element */
        audio {
            display: none;
        }

        /* Slideshow Container */
        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 25px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid white;
            background-color: white;
        }

        .mySlides {
            display: none;
        }

        .slideshow-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Next & previous buttons */
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: auto;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev {
            left: 0;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        /* Message Card */
        .card {
            border-left: 5px solid var(--primary-color);
            background: #f9f9f9;
            padding: 20px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        /* Avatar Photo Container */
        .avatar-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 25px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 5px solid white;
            background-color: white;
        }

        .caption {
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #d63031;
            font-style: italic;
        }

        /* Button */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        }

        .btn:hover {
            background-color: #ff4757;
            transform: scale(1.05);
        }

        /* Canvas for confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
